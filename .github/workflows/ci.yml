name: CI

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.repository == github.event.pull_request.head.repo.full_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout tools
        uses: actions/checkout@v4
        with:
          repository: getkawai/tools
          path: tools

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        shell: bash
        run: |
          yes | sdkmanager "ndk;26.3.11579264" > /dev/null
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Build Android native libs
        working-directory: dart_go_bridge
        run: ./scripts/build_android.sh

      - name: Upload Android libs
        uses: actions/upload-artifact@v4
        with:
          name: android-jniLibs
          path: dart_go_bridge/android/src/main/jniLibs

  ios:
    runs-on: macos-latest
    if: ${{ github.event_name != 'pull_request' || github.repository == github.event.pull_request.head.repo.full_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout tools
        uses: actions/checkout@v4
        with:
          repository: getkawai/tools
          path: tools

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build iOS native libs
        working-directory: dart_go_bridge
        run: ./scripts/build_ios.sh

      - name: Upload iOS xcframework
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcframework
          path: dart_go_bridge/ios/DartGoBridge.xcframework

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [android, ios]
    steps:
      - name: Download Android libs
        uses: actions/download-artifact@v4
        with:
          name: android-jniLibs
          path: android-jniLibs

      - name: Download iOS xcframework
        uses: actions/download-artifact@v4
        with:
          name: ios-xcframework
          path: ios-xcframework

      - name: Archive artifacts
        run: |
          tar -czf android-jniLibs.tar.gz -C android-jniLibs .
          zip -r ios-xcframework.zip ios-xcframework

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-jniLibs.tar.gz
            ios-xcframework.zip
